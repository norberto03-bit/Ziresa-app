<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Manicurista</title>
  <link rel="stylesheet" href="assets/index.css">
  <style>
    .agenda-list { display: grid; gap: 14px; margin-top: 20px; }
    .agenda-item { display: grid; grid-template-columns: 90px 1fr auto; gap: 16px; align-items: center; padding: 18px; background: rgba(255,255,255,0.68); border: 1px solid rgba(255,255,255,0.9); border-radius: 14px; }
    .agenda-time { color: var(--primary); font-size: 1.25rem; font-weight: 800; }
    .status-pill { padding: 6px 10px; border-radius: 999px; background: rgba(92,26,112,0.1); color: var(--primary); font-size: 0.82rem; font-weight: 800; white-space: nowrap; }
    .staff-actions { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    @media (max-width: 760px) {
      .agenda-item { grid-template-columns: 1fr; }
      .staff-actions { justify-content:flex-start; }
    }
  </style>
</head>
<body>
  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>
  <div class="hub-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Ziresa Staff</div>
      <ul class="sidebar-nav">
        <li><a href="#" class="active" onclick="showTab('agenda', this); loadToday();">Mi Agenda Hoy</a></li>
        <li><a href="#" onclick="showTab('finanzas', this)">Mis Finanzas</a></li>
        <li><a href="#" onclick="logout()">Salir</a></li>
      </ul>
    </aside>

    <main class="main-content">
      <div id="tab-agenda">
        <h2>Mi Dia</h2>
        <div class="dash-grid" style="margin-top: 24px;">
          <div class="dash-card">
            <h4>Citas de hoy</h4>
            <div class="value" id="today-count">0</div>
          </div>
          <div class="dash-card">
            <h4>Propinas hoy</h4>
            <div class="value" id="tips-today">$0</div>
          </div>
        </div>
        <div class="glass-panel" style="padding:20px; margin-top:20px;">
          <div id="agenda-list" class="agenda-list">Cargando agenda...</div>
        </div>
      </div>

      <div id="tab-finanzas" style="display:none;">
        <h2>Registro de Propinas</h2>
        <div class="glass-panel" style="padding:20px; margin-top:20px; max-width:520px;">
          <form id="tip-form">
            <div class="form-group">
              <label class="form-label" for="tip-amount">Monto (MXN)</label>
              <input type="number" id="tip-amount" class="form-control" placeholder="Ej. 50" min="1" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="tip-method">Metodo</label>
              <select id="tip-method" class="form-control">
                <option value="efectivo">Efectivo</option>
                <option value="tarjeta">Tarjeta</option>
                <option value="transferencia">Transferencia</option>
              </select>
            </div>
            <button class="btn btn-primary" style="width:100%;">Registrar Ingreso</button>
          </form>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/security.js"></script>
  <script>
    async function requireStaffSession() {
      const res = await fetch('api/auth/session.php');
      const data = await res.json();
      setCsrfToken(data.csrf_token);
      if(!data.authenticated || data.type !== 'manicurist') window.location.href = 'index.html#login';
    }

    async function logout() {
      await apiFetch('api/auth/logout.php', { method: 'POST' });
      window.location.href = 'index.html';
    }

    function showTab(tab, link) {
      /* ANTIGRAVITY UPGRADE: Tab fade-in animation */
      ['agenda','finanzas'].forEach(id => {
        const el = document.getElementById('tab-' + id);
        if (id === tab) {
          el.style.display = 'block';
          el.classList.remove('tab-panel-active');
          void el.offsetWidth;
          el.classList.add('tab-panel-active');
        } else {
          el.style.display = 'none';
        }
      });
      document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
      if(link) link.classList.add('active');
    }

    async function loadToday() {
      const list = document.getElementById('agenda-list');
      /* ANTIGRAVITY UPGRADE: Skeleton while loading */
      list.innerHTML = [1,2,3].map(() =>
        `<div class="skeleton-card" style="display:grid;grid-template-columns:90px 1fr auto;gap:16px;align-items:center;">
          <div class="skeleton-block skeleton-line w-full" style="height:28px;"></div>
          <div>
            <div class="skeleton-block skeleton-line w-70"></div>
            <div class="skeleton-block skeleton-line w-40"></div>
          </div>
          <div class="skeleton-block" style="width:70px;height:28px;border-radius:999px;"></div>
        </div>`).join('');
      const res = await fetch('api/manicurist/today.php');
      const data = await res.json();
      if(!data.success) {
        list.innerHTML = '<p class="empty-state">No se pudo cargar la agenda.</p>';
        return;
      }
      document.getElementById('today-count').textContent = data.appointments.length;
      document.getElementById('tips-today').textContent = '$' + Number(data.tips_today || 0).toLocaleString('es-MX');
      if(!data.appointments.length) {
        /* ANTIGRAVITY UPGRADE: Branded empty state */
        list.innerHTML = `<div style="text-align:center;padding:40px 20px;">
          <div style="font-size:3rem;margin-bottom:12px;">&#9728;</div>
          <p style="font-weight:800;color:var(--primary);font-size:1.1rem;">Dia libre hoy</p>
          <p style="color:#666;margin-top:6px;">No hay citas agendadas. Â¡Disfruta tu dia!</p>
        </div>`;
        return;
      }
      list.innerHTML = data.appointments.map(app => {
        const services = (app.services || []).map(s => s.name).join(', ');
        return `<div class="agenda-item">
          <div class="agenda-time">${escapeHTML(app.time)}</div>
          <div>
            <strong>${escapeHTML(app.client_name)}</strong>
            <span>${escapeHTML(services)}</span>
            <span>${escapeHTML(app.client_phone ? 'WhatsApp: ' + app.client_phone : '')}</span>
          </div>
          <div>
            <div class="status-pill">${escapeHTML(app.status || 'pendiente')}</div>
            <div class="staff-actions" style="margin-top:10px;">
              <button class="btn btn-outline" type="button" onclick="updateStaffStatus('${app.id}', 'confirmada')">Confirmar</button>
              <button class="btn btn-outline" type="button" onclick="updateStaffStatus('${app.id}', 'en_proceso')">Iniciar</button>
              <button class="btn btn-primary" type="button" onclick="updateStaffStatus('${app.id}', 'completada')">Finalizar</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    async function updateStaffStatus(id, status) {
      try {
        const res = await apiFetch('api/appointments/update_status.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ appointment_id: id, status })
        });
        const data = await res.json();
        if(!res.ok || !data.success) throw new Error(data.error || 'No se pudo actualizar.');
        notify('Cita actualizada.', 'success');
        loadToday();
      } catch (err) {
        notify(err.message || 'Error al actualizar cita.', 'error');
      }
    }

    document.getElementById('tip-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = Number(document.getElementById('tip-amount').value);
      const method = document.getElementById('tip-method').value;
      const res = await apiFetch('api/finances/add.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ type: 'propina', amount, method, description: 'Propina registrada por manicurista' })
      });
      const data = await res.json();
      notify(data.success ? 'Propina registrada.' : (data.error || 'No se pudo registrar.'));
      if(data.success) {
        e.target.reset();
        loadToday();
      }
    });

    /* ANTIGRAVITY UPGRADE: Typed toast with slide-up/fade-out animation */
    function notify(message, type = 'info') {
      const icons = { success: 'âœ“', error: 'âœ•', info: 'â„¹' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span style="font-size:1rem">${escapeHTML(icons[type] || '●')}</span><span>${escapeHTML(message)}</span>`;
      document.body.appendChild(toast);
      requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('toast-show')));
      setTimeout(() => {
        toast.classList.remove('toast-show');
        toast.addEventListener('transitionend', () => toast.remove(), { once: true });
      }, 3200);
    }

    requireStaffSession().then(loadToday);
  </script>
</body>
</html>
